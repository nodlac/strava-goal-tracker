{{template "header.html"}}
{{template "nav.html" .}}
<main>
    <h1>{{.Username}}'s Dashboard</h1>
    <p><strong>Measurement Units:</strong> {{.MeasurementLabel}}</p>
    <p><strong>Timezone:</strong> {{.Timezone}}</p>
    
    <div id="sync-ui">
        <button class="btn btn-primary" hx-post="/sync" hx-target="#sync-ui" hx-indicator="#loading">
            Sync Now
        </button>
        <span id="loading" class="htmx-indicator">Syncing...</span>
    </div>
</main>
